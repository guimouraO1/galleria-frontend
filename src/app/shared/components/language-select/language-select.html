<div class="flex items-center rounded-md border border-transparent">
    @for (languageOption of languages; track languageOption.value) {
        <button
            pButton
            [icon]="languageOption.icon"
            [label]="languageOption.label"
            [severity]="isSelected(languageOption.value) ? 'primary' : 'secondary'"
            [text]="!isSelected(languageOption.value)"
            size="small"
            type="button"
            class="px-2"
            (click)="changeLanguage(languageOption.value)"></button>
    }
</div>
