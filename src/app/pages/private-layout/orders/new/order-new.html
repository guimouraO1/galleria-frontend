<div class="mx-auto mt-12 w-full max-w-xl md:mt-24">
    <p-card [header]="'app.pages.orders.new' | translate">
        <form class="flex flex-col gap-3" (submit)="submit($event)">
            <p-inputGroup>
                <p-inputGroupAddon addonType="prepend">
                    <i class="pi pi-hashtag"></i>
                </p-inputGroupAddon>
                <input [formField]="orderForm.referenceCode" pInputText [placeholder]="'app.pages.orders.fields.referenceCode' | translate" />
            </p-inputGroup>
            <p-inputGroup>
                <p-inputGroupAddon addonType="prepend">
                    <i class="pi pi-align-left"></i>
                </p-inputGroupAddon>
                <input [formField]="orderForm.description" pInputText [placeholder]="'app.pages.orders.fields.description' | translate" />
            </p-inputGroup>
            <p-inputGroup>
                <p-inputGroupAddon addonType="prepend">
                    <i class="pi pi-user"></i>
                </p-inputGroupAddon>
                <p-select
                    [options]="clients()"
                    optionLabel="name"
                    optionValue="id"
                    [disabled]="isLoading()"
                    [loading]="isLoadingClients()"
                    [placeholder]="'app.pages.orders.fields.clientId' | translate"
                    (onChange)="setClientId($event.value)"
                    styleClass="w-full" />
            </p-inputGroup>
            <div class="flex justify-end">
                <p-button
                    (click)="loadMoreClients()"
                    [disabled]="!hasMoreClients() || isLoadingClients()"
                    [label]="'app.common.actions.load_more' | translate"
                    severity="secondary"
                    text
                    size="small"
                    type="button" />
            </div>
            <p-inputGroup>
                <p-inputGroupAddon addonType="prepend">
                    <i class="pi pi-box"></i>
                </p-inputGroupAddon>
                <p-multiselect
                    [options]="products()"
                    optionLabel="description"
                    optionValue="id"
                    [disabled]="isLoading()"
                    [loading]="isLoadingProducts()"
                    [placeholder]="'app.pages.orders.fields.productIds' | translate"
                    (onChange)="setProductIds($event.value)"
                    display="chip"
                    styleClass="w-full" />
            </p-inputGroup>
            <div class="flex justify-end">
                <p-button
                    (click)="loadMoreProducts()"
                    [disabled]="!hasMoreProducts() || isLoadingProducts()"
                    [label]="'app.common.actions.load_more' | translate"
                    severity="secondary"
                    text
                    size="small"
                    type="button" />
            </div>
            <div class="flex flex-col-reverse gap-2 sm:flex-row sm:justify-end">
                <p-button routerLink="/order" [disabled]="isLoading()" [label]="'app.common.actions.cancel' | translate" severity="secondary" text type="button" styleClass="w-full sm:w-auto" />
                <p-button [disabled]="orderForm().invalid() || isLoading()" [loading]="isLoading()" [label]="'app.common.actions.save' | translate" type="submit" styleClass="w-full sm:w-auto" />
            </div>
        </form>
    </p-card>
</div>
