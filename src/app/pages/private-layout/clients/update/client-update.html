<div class="mx-auto mt-12 w-full max-w-xl md:mt-24">
    <p-card [header]="'app.pages.clients.update' | translate">
        <form class="flex flex-col gap-3" (submit)="submit($event)">
            <p-inputGroup>
                <p-inputGroupAddon addonType="prepend">
                    <i class="pi pi-id-card"></i>
                </p-inputGroupAddon>
                <input [formField]="clientForm.name" pInputText [placeholder]="'app.pages.clients.fields.name' | translate" />
            </p-inputGroup>
            <p-inputGroup>
                <p-inputGroupAddon addonType="prepend">
                    <i class="pi pi-phone"></i>
                </p-inputGroupAddon>
                <input [formField]="clientForm.phone" pInputText [pInputMask]="'(99) 99999-9999'" [placeholder]="'app.pages.clients.fields.phone' | translate" />
            </p-inputGroup>
            <div class="flex flex-col-reverse gap-2 sm:flex-row sm:justify-end">
                <p-button routerLink="/client" [disabled]="isLoading()" [label]="'app.common.actions.cancel' | translate" severity="secondary" text type="button" styleClass="w-full sm:w-auto" />
                <p-button [disabled]="clientForm().invalid() || isLoading()" [loading]="isLoading()" [label]="'app.common.actions.save' | translate" type="submit" styleClass="w-full sm:w-auto" />
            </div>
        </form>
    </p-card>
</div>
