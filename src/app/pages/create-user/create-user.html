<div class="h-screen flex flex-col items-center justify-center">
    <div class="w-full max-w-md px-4">
        <p-card [header]="'app.pages.create_user.title' | translate">
            <form class="flex flex-col gap-2 mt-4" (submit)="onSubmit($event)">
                <p-inputGroup>
                    <p-inputGroupAddon addonType="prepend">
                        <i class="pi pi-id-card"></i>
                    </p-inputGroupAddon>
                    <input [formField]="createUserForm.name" type="text" pInputText />
                </p-inputGroup>
                <p-inputGroup>
                    <p-inputGroupAddon addonType="prepend">
                        <i class="pi pi-user"></i>
                    </p-inputGroupAddon>
                    <input [formField]="createUserForm.login" type="text" pInputText />
                </p-inputGroup>
                <p-inputGroup>
                    <p-inputGroupAddon addonType="prepend">
                        <i class="pi pi-lock"></i>
                    </p-inputGroupAddon>
                    <input [formField]="createUserForm.password" type="password" pInputText />
                </p-inputGroup>
                <div class="flex flex-col gap-1 pl-1">
                    <p-message severity="secondary" variant="simple" size="small">{{'validation.passwordMin' | translate}}</p-message>
                    <p-message severity="secondary" variant="simple" size="small">{{'validation.passwordUppercase' | translate}}</p-message>
                    <p-message severity="secondary" variant="simple" size="small">{{'validation.passwordLowercase' | translate}}</p-message>
                    <p-message severity="secondary" variant="simple" size="small">{{'validation.passwordNumber' | translate}}</p-message>
                    <p-message severity="secondary" variant="simple" size="small">{{'validation.passwordSpecial' | translate}}</p-message>
                </div>
                <p-button [disabled]="createUserForm().invalid() || isLoading()" [loading]="isLoading()" icon="pi pi-user-plus" [label]="'app.pages.create_user.submit' | translate" type="submit" styleClass="w-full mt-4" />
            </form>
        </p-card>
        <div class="mt-3 text-center">
            <p-button
                [disabled]="isLoading()"
                size="small"
                routerLink="/login"
                [label]="'app.pages.create_user.back_to_login' | translate"
                severity="secondary"
                variant="text"
                type="button" />
        </div>
    </div>
</div>
